name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      rpi-led-matrix--release_created: ${{ steps.release.outputs.rpi-led-matrix--release_created }}
      rpi-led-matrix--tag_name: ${{ steps.release.outputs.rpi-led-matrix--tag_name }}
      rpi-led-matrix-sys--release_created: ${{ steps.release.outputs.rpi-led-matrix-sys--release_created }}
      rpi-led-matrix-sys--tag_name: ${{ steps.release.outputs.rpi-led-matrix-sys--tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Show outputs
        if: ${{ steps.release.outputs }}
        continue-on-error: true
        env:
          RELEASE_OUTPUTS_JSON: ${{ toJson(steps.release.outputs) }}
        run: |
          echo "${{ toJson(steps.release.outputs) }}"

  publish-rpi-led-matrix-sys:
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.rpi-led-matrix-sys--release_created == 'true' }}
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.rpi-led-matrix-sys--tag_name }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish rpi-led-matrix-sys crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked --no-verify -p rpi-led-matrix-sys

  publish-rpi-led-matrix:
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.rpi-led-matrix--release_created == 'true' }}
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.rpi-led-matrix--tag_name }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish rpi-led-matrix crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked --no-verify -p rpi-led-matrix
